name: Build and Push Docker Image

on:
  push:
    branches:
      - main # main 브랜치에 코드가 push될 때만 실행됩니다.
  pull_request:
    branches:
      - main

jobs:
  docker-build-push:
    name: Docker Build and Push
    runs-on: ubuntu-latest

    steps:
      # 1. GitHub 저장소의 코드를 러너(runner) 서버로 내려받습니다.
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. 다중 아키텍처 지원 및 빌드 캐싱 최적화를 위해 QEMU / Buildx 세팅
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. GitHub Secrets에 저장된 자격 증명으로 Docker Hub에 로그인합니다.
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 4. Docker 이미지를 빌드하고 Docker Hub로 Push 합니다. (캐싱 적용 최적화)
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./music-genre-api
          file: ./music-genre-api/Dockerfile
          push: true
          # <본인의 도커허브 ID>/music-genre-api 형태로 태그가 달리게 됩니다.
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/music-genre-api:latest
          # 캐시 활용 (다음 빌드 속도가 대폭 향상됩니다)
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/music-genre-api:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/music-genre-api:buildcache,mode=max

  deploy:
    name: Deploy to Self-hosted Mac
    needs: docker-build-push # 앞의 빌드-푸시 작업이 성공해야만 실행됩니다.
    runs-on: self-hosted # 사용자님의 맥북에서 직접 쉘 명령어를 실행합니다.

    steps:
      - name: Login to Docker Hub
        # 보안을 위해 CLI 로그인 방식을 사용합니다.
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Pull and Run Container
        run: |
          # 1. Docker Hub에서 가장 최신 이미지를 다운받기
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/music-genre-api:latest
          
          # 2. 만약 기존에 돌고 있던 컨테이너가 있다면 중지하고 삭제 (최초 실행 시 생기는 에러는 무시)
          docker stop music-genre-api || true
          docker rm music-genre-api || true
          
          # 3. 새로운 이미지로 컨테이너를 백그라운드(-d)로 실행하기
          docker run -d \
            --name music-genre-api \
            -p 8000:8000 \
            ${{ secrets.DOCKERHUB_USERNAME }}/music-genre-api:latest
